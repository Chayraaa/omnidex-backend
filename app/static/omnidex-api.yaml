openapi: 3.0.3
info:
  title: Omnidex API
  version: 1.0.0
servers:
  - url: http://127.0.0.1:5000

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    entry:
      type: object
      required:
        - id
        - name
        - pictureId
        - description
        - category
        - entryDate
        - firstDiscoveredUserId
      properties:
        id:
          type: integer
          example: 101
        name:
          type: string
          example: Oak Tree
        pictureId:
          type: integer
          example: 5821
        description:
          type: string
          example: Large deciduous tree commonly found in forests.
        category:
          $ref: "#/components/schemas/category"
        entryDate:
          type: string
          format: date
          example: 2026-04-26
        firstDiscoveredUserId:
          type: integer
          example: 42

    newEntry:
      type: object
      required:
        - name
        - pictureId
        - description
        - category
      properties:
        name:
          type: string
        pictureId:
          type: integer
        description:
          type: string
        category:
          $ref: "#/components/schemas/category"

    entryUpdate:
      type: object
      properties:
        name:
          type: string
        pictureId:
          type: integer
        description:
          type: string
        category:
          $ref: "#/components/schemas/category"

    category:
      type: string
      enum:
        - PLANT
        - ANIMAL
        - OBJECT
        - MINERAL
        - FOOD

security:
  - bearerAuth: [ ]

paths:
  /api/users/create:
    post:
      summary: Create a new user
      description: Creates a new user with a username, email and password.
      tags:
        - Users
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: alice
                email:
                  type: string
                  format: email
                  example: alice@example.com
                password:
                  type: string
                  example: securePassword123
              required:
                - name
                - email
                - password

      responses:
        "201":
          description: User successfully created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User created successfully.

        "400":
          description: Invalid input or user already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User already exists

  /api/users/login:
    post:
      summary: Login user
      description: Authenticates user and returns a JWT token.
      tags:
        - Users
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: alice@example.com
                password:
                  type: string
                  example: securePassword123
              required:
                - email
                - password

      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Login successful
                  token:
                    type: string
                    example: eyJhbGciOi...

        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid credentials

  /api/users/google/login:
    get:
      summary: Redirect to Google OAuth
      description: Redirects user to Google login page.
      tags:
        - Google OAuth
      security: [ ]
      responses:
        "302":
          description: Redirect to Google OAuth

  /api/users/google/callback:
    get:
      summary: Google OAuth callback
      description: Handles Google OAuth response and returns JWT.
      tags:
        - Google OAuth
      security: [ ]
      responses:
        "200":
          description: Login successful via Google
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: eyJhbGciOi...
        "401":
          description: OAuth authentication failed
        "400":
          description: OAuth login failed (e.g. invalid or mismatching state / CSRF protection triggered)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: oauth_state_mismatch
                  message:
                    type: string
                    example: Login session expired or invalid state. Please try again.

  /api/status/health:
    get:
      summary: "Health check"
      description: "Responds with a simple OK"
      tags:
        - Status
      security: [ ]
      responses:
        "200":
          description: "Service is healthy"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "OK"

  /api/scan/login_test:
    get:
      summary: "Login test"
      description: "Responds with the user name"
      tags:
        - Login
      responses:
        "200":
          description: "User was authenticated"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Hallo alice"

  /api/users/set_profile_picture:
    post:
      summary: Set user profile picture
      description: Uploads and sets the profile picture for the authenticated user.
      tags:
        - Users

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  description: Base64 encoded image (data URL format)
                  example: "data:image/jpeg;base64,"

      responses:
        "200":
          description: Profile picture set successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Profile picture set successfully.

        "400":
          description: Invalid input (e.g. missing image)

        "401":
          description: Unauthorized

  /api/users/get_profile_picture/{user_id}:
    get:
      summary: Get user profile picture URL
      description: Returns a temporary URL to access the user's profile picture.
      tags:
        - Users
      security: [ ]

      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
            example: 1
          description: ID of the user whose profile picture is requested

      responses:
        "200":
          description: Profile picture URL returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    example: https://example.com/image.jpg

        "400":
          description: Invalid request (missing or invalid user_id)

        "404":
          description: User or profile picture not found

  /api/image/{key}:
    get:
      summary: Get image by key
      security: [ ]
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
          description: Path to the image in storage
      responses:
        '200':
          description: Image file
          content:
            image/jpeg:
              schema:
                type: string
                format: binary

  # Nia changes start!!

  /api/entries/{entryId}:
    get:
      summary: Retrieve a single entry by entryId
      tags:
        - Entries
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Entry successfully retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/entry"
        "400":
          description: Invalid entry ID
        "404":
          description: Entry not found
        "500":
          description: Internal server error

    delete:
      summary: Delete an entry per entryId
      tags:
        - Entries
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Entry successfully deleted
        "400":
          description: Invalid request
        "401":
          description: Unauthorized. Please log in
        "403":
          description: Forbidden. This entry is not yours
        "404":
          description: Entry not found
        "500":
          description: Internal server error

    put:
      summary: Update an existing entry per entryId
      tags:
        - Entries
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/entryUpdate"
      responses:
        "200":
          description: Entry successfully updated
        "400":
          description: Invalid request
        "401":
          description: Unauthorized. Please log in
        "403":
          description: Forbidden. This entry is not yours
        "404":
          description: Entry not found
        "409":
          description: Update conflict
        "422":
          description: Unable to process update.
        "500":
          description: Internal server error


  /api/entries/categories/{categoryId}:
    get:
      summary: Retrieve all entrys of said category by categoryId
      tags:
        - Entries
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category successfully retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/entry"
        "400":
          description: Invalid request
        "404":
          description: No categories found
        "500":
          description: Internal server error


  /api/entries:
    post:
      summary: Create a new entry
      tags:
        - Entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/entry"
      responses:
        "201":
          description: Entry successfully created
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "422":
          description: Cannot process data.
        "500":
          description: Internal server error


  /api/entries/{userId}/entries:
    get:
      summary: Retrieve all entries discovered by a user by userId
      tags:
        - Entries
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User entries successfully retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/entry"
        "403":
          description: Forbidden. You do not have access to this user.
        "404":
          description: User or entries not found
        "500":
          description: Internal server error


  /api/entries/{userId}/categories/{categoryId}:
    get:
      summary: Retrieve user entries filtered by category
      tags:
        - Entries
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Filtered entries successfully retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/entry"
        "400":
          description: Invalid parameters
        "404":
          description: User or category not found
        "500":
          description: Internal server error