openapi: 3.0.3
info:
  title: Omnidex API
  version: 1.0.0
servers:
  - url: http://127.0.0.1:5000

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    entry:
      type: object
      required:
        - id
        - name
        - pictureId
        - description
        - category
        - entryDate
        - firstDiscoveredUserId
      properties:
        id:
          type: integer
          example: 101
        name:
          type: string
          example: Oak Tree
        pictureId:
          type: integer
          example: 5821
        description:
          type: string
          example: Large deciduous tree commonly found in forests.
        category:
          $ref: "#/components/schemas/category"
        entryDate:
          type: string
          format: date
          example: 2026-04-26
        firstDiscoveredUserId:
          type: integer
          example: 42

    newEntry:
      type: object
      required:
        - name
        - pictureId
        - description
        - category
      properties:
        name:
          type: string
        pictureId:
          type: integer
        description:
          type: string
        category:
          $ref: "#/components/schemas/category"

    entryUpdate:
      type: object
      properties:
        name:
          type: string
        pictureId:
          type: integer
        description:
          type: string
        category:
          $ref: "#/components/schemas/category"

    category:
      type: string
      enum:
        - PLANT
        - ANIMAL
        - OBJECT
        - MINERAL
        - FOOD

    user:
      type: object
      required:
        - id
        - name
        - friends
        - pictureURL
      properties:
        id:
          type: integer
          example: 42
        name:
          type: string
          example: Alice
        friends:
          type: array
          description: Array of friend user IDs
          items:
            type: integer
            example: 17
          example:
            - 17
            - 23
            - 91
        pictureURL:
          type: string
          example: https://example.com/profile.jpg

    recognitionAlternative:
      type: object
      required:
        - label
      properties:
        label:
          type: string
          example: cat
        confidence:
          type: number
          format: float
          nullable: true
          example: 0.74

    recognitionResult:
      type: object
      required:
        - label
        - confidence
        - alternatives
      properties:
        label:
          type: string
          example: cat
        confidence:
          type: number
          format: float
          example: 0.91
        alternatives:
          type: array
          items:
            $ref: "#/components/schemas/recognitionAlternative"
        category_hint:
          type: string
          nullable: true
          example: ANIMAL

    scanResult:
      type: object
      required:
        - label
        - confidence
        - alternatives
        - description
        - card_summary
        - knowledge_enriched
        - summary_generated_by_ai
      properties:
        id:
          type: integer
          nullable: true
          example: 3001
        label:
          type: string
          example: Oak tree
        confidence:
          type: number
          format: float
          example: 0.94
        category_hint:
          type: string
          nullable: true
          example: PLANT
        alternatives:
          type: array
          items:
            $ref: "#/components/schemas/recognitionAlternative"
        description:
          type: string
          example: Oaks are trees in the genus Quercus.
        card_summary:
          type: string
          description: Short summary for object cards, generated by AI or fallback and limited to max two sentences.
          example: Oak trees are long-lived hardwood trees common in temperate regions. They produce acorns and support many ecosystems.
        source_title:
          type: string
          nullable: true
          example: Oak
        source_url:
          type: string
          nullable: true
          example: https://en.wikipedia.org/wiki/Oak
        image_reference:
          type: string
          nullable: true
        knowledge_enriched:
          type: boolean
          example: true
        summary_generated_by_ai:
          type: boolean
          description: True when card_summary was generated by LISA summarization; false when fallback logic was used.
          example: true
        created_at:
          type: string
          nullable: true
          example: "2026-05-06T11:30:00Z"

    collectionEntrySummary:
      type: object
      required:
        - id
        - label
      properties:
        id:
          type: integer
          example: 2
        label:
          type: string
          example: lizard
        category:
          type: string
          nullable: true
          enum:
            - Pflanze
            - Insekten
            - Tiere
            - Nahrung
            - Unbekannt
            - Technik
            - Mechanik
            - Gestein
            - Gegenstände
        card_summary:
          type: string
          nullable: true
          description: Short summary shown on object cards, generated by AI or fallback.
        image_url:
          type: string
          nullable: true
          example: http://127.0.0.1:5000/api/image/cards/1/abc.jpeg
        created_at:
          type: string
          nullable: true
          example: "2026-05-14T18:59:18"
        confidence:
          type: number
          format: float
          nullable: true
          example: 0.95

    collectionEntryDetail:
      type: object
      required:
        - id
        - label
      properties:
        id:
          type: integer
          example: 2
        label:
          type: string
          example: lizard
        category:
          type: string
          nullable: true
          enum:
            - Pflanze
            - Insekten
            - Tiere
            - Nahrung
            - Unbekannt
            - Technik
            - Mechanik
            - Gestein
            - Gegenstände
        confidence:
          type: number
          format: float
          nullable: true
        card_summary:
          type: string
          nullable: true
          description: Short summary shown on object cards, generated by AI or fallback.
        description:
          type: string
          nullable: true
        source_title:
          type: string
          nullable: true
        source_url:
          type: string
          nullable: true
        alternatives:
          type: array
          items:
            $ref: "#/components/schemas/recognitionAlternative"
        image_url:
          type: string
          nullable: true
        created_at:
          type: string
          nullable: true
          example: "2026-05-14T18:59:18"

security:
  - bearerAuth: [ ]

paths:
  /api/users/create:
    post:
      summary: Create a new user
      description: Creates a new user with a username, email and password.
      tags:
        - Users
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: alice
                email:
                  type: string
                  format: email
                  example: alice@example.com
                password:
                  type: string
                  example: securePassword123
              required:
                - name
                - email
                - password

      responses:
        "201":
          description: User successfully created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User created successfully.

        "400":
          description: Invalid input or user already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User already exists

  /api/users/login:
    post:
      summary: Login user
      description: Authenticates a local user or refreshes an existing session and returns access plus refresh tokens.
      tags:
        - Users
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  properties:
                    email:
                      type: string
                      format: email
                      example: alice@example.com
                    password:
                      type: string
                      example: securePassword123
                  required:
                    - email
                    - password
                - type: object
                  properties:
                    refresh_token:
                      type: string
                      description: Refresh token used for session rotation.
                      example: 7fe3cfec5c1140f2a8fd9ca8f8e0b56a
                  required:
                    - refresh_token

      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Login successful
                  access_token:
                    type: string
                    example: eyJhbGciOi...
                  refresh_token:
                    type: string
                    example: 7fe3cfec5c1140f2a8fd9ca8f8e0b56a

        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid credentials

  /api/users/google/login:
    get:
      summary: Redirect to Google OAuth
      description: Redirects user to Google login page.
      tags:
        - Google OAuth
      security: [ ]
      responses:
        "302":
          description: Redirect to Google OAuth

  /api/users/google/callback:
    get:
      summary: Google OAuth callback
      description: Handles Google OAuth response and returns access plus refresh tokens.
      tags:
        - Google OAuth
      security: [ ]
      responses:
        "200":
          description: Login successful via Google
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    example: eyJhbGciOi...
                  refresh_token:
                    type: string
                    example: 7fe3cfec5c1140f2a8fd9ca8f8e0b56a
        "401":
          description: OAuth authentication failed
        "400":
          description: OAuth login failed (e.g. invalid or mismatching state / CSRF protection triggered)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: oauth_state_mismatch
                  message:
                    type: string
                    example: Login session expired or invalid state. Please try again.

  /api/status/health:
    get:
      summary: "Health check"
      description: "Responds with a simple OK"
      tags:
        - Status
      security: [ ]
      responses:
        "200":
          description: "Service is healthy"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "OK"

  /api/scan/login_test:
    get:
      summary: "Login test"
      description: "Responds with the user name"
      tags:
        - Login
      responses:
        "200":
          description: "User was authenticated"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Hallo alice"

  /api/scan:
    post:
      summary: Create scan result from image
      description: Recognizes the uploaded image and enriches it with Wikipedia information.
      tags:
        - Scan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  description: Base64-encoded image. Data URL format is also accepted.
                  example: "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD..."
      responses:
        "200":
          description: Scan created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/scanResult"
        "400":
          description: Invalid request payload
        "422":
          description: Low confidence recognition result
        "502":
          description: Recognition returned invalid provider data
        "503":
          description: Recognition service unavailable

  /api/scan/recognize:
    post:
      summary: Recognize object from image via LISA
      description: Sends image data to recognition provider and returns normalized recognition result.
      tags:
        - Scan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  description: Base64-encoded image. Data URL format is also accepted.
                  example: "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD..."
      responses:
        "200":
          description: Recognition succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/recognitionResult"
        "400":
          description: Invalid request payload
        "422":
          description: Low confidence result
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Low confidence recognition result.
                  label:
                    type: string
                    example: cat
                  confidence:
                    type: number
                    format: float
                    example: 0.41
                  minimum_confidence:
                    type: number
                    format: float
                    example: 0.90
        "502":
          description: Invalid provider response
        "503":
          description: Recognition service unavailable

  /api/users/set_profile_picture:
    post:
      summary: Set user profile picture
      description: Uploads and sets the profile picture for the authenticated user.
      tags:
        - Users

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  description: Base64 encoded image (data URL format)
                  example: "data:image/jpeg;base64,"

      responses:
        "200":
          description: Profile picture set successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Profile picture set successfully.

        "400":
          description: Invalid input (e.g. missing image)

        "401":
          description: Unauthorized

  /api/users/get_profile_picture/{user_id}:
    get:
      summary: Get user profile picture URL
      description: Returns a temporary URL to access the user's profile picture.
      tags:
        - Users
      security: [ ]

      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
            example: 1
          description: ID of the user whose profile picture is requested

      responses:
        "200":
          description: Profile picture URL returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    example: https://example.com/image.jpg

        "400":
          description: Invalid request (missing or invalid user_id)

        "404":
          description: User or profile picture not found

  /api/image/{key}:
    get:
      summary: Get image by key
      security: [ ]
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
          description: Path to the image in storage
      responses:
        '200':
          description: Image file
          content:
            image/jpeg:
              schema:
                type: string
                format: binary

  /api/collections/me:
    get:
      summary: List the authenticated user's saved collection entries
      tags:
        - Collection
      parameters:
        - in: query
          name: query
          required: false
          schema:
            type: string
          description: Optional search text. Matches label, card summary and description.
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [newest, oldest]
            default: newest
          description: Sort order by scan creation time.
        - in: query
          name: category
          required: false
          schema:
            type: string
            enum:
              - Pflanze
              - Insekten
              - Tiere
              - Nahrung
              - Unbekannt
              - Technik
              - Mechanik
              - Gestein
              - Gegenstände
          description: Filter by the already stored category value.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 0
          description: Optional maximum number of entries to return.
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
          description: Optional number of entries to skip.
      responses:
        "200":
          description: User collection entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/collectionEntrySummary"
        "400":
          description: Invalid sort/category/limit/offset.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "401":
          description: Unauthorized.

  /api/collections/me/{entryId}:
    get:
      summary: Get details of a single collection entry owned by the authenticated user
      tags:
        - Collection
      parameters:
        - in: path
          name: entryId
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Collection entry detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/collectionEntryDetail"
        "401":
          description: Unauthorized.
        "404":
          description: Collection entry not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  # Nia changes start!!

  /api/entries/{entryId}:
    get:
      summary: Retrieve a single entry by entryId
      tags:
        - Entries
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Entry successfully retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/entry"
        "400":
          description: Invalid entry ID
        "404":
          description: Entry not found
        "500":
          description: Internal server error

    delete:
      summary: Delete an entry per entryId
      tags:
        - Entries
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Entry successfully deleted
        "400":
          description: Invalid request
        "401":
          description: Unauthorized. Please log in
        "403":
          description: Forbidden. This entry is not yours
        "404":
          description: Entry not found
        "500":
          description: Internal server error

    put:
      summary: Update an existing entry per entryId
      tags:
        - Entries
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/entryUpdate"
      responses:
        "200":
          description: Entry successfully updated
        "400":
          description: Invalid request
        "401":
          description: Unauthorized. Please log in
        "403":
          description: Forbidden. This entry is not yours
        "404":
          description: Entry not found
        "409":
          description: Update conflict
        "422":
          description: Unable to process update.
        "500":
          description: Internal server error


  /api/entries/categories/{categoryId}:
    get:
      summary: Retrieve all entrys of said category by categoryId
      tags:
        - Entries
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category successfully retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/entry"
        "400":
          description: Invalid request
        "404":
          description: No categories found
        "500":
          description: Internal server error


  /api/entries:
    post:
      summary: Create a new entry
      tags:
        - Entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/entry"
      responses:
        "201":
          description: Entry successfully created
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "422":
          description: Cannot process data.
        "500":
          description: Internal server error


  /api/entries/{userId}/entries:
    get:
      summary: Retrieve all entries discovered by a user by userId
      tags:
        - Entries
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User entries successfully retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/entry"
        "403":
          description: Forbidden. You do not have access to this user.
        "404":
          description: User or entries not found
        "500":
          description: Internal server error


  /api/entries/{userId}/categories/{categoryId}:
    get:
      summary: Retrieve user entries filtered by category
      tags:
        - Entries
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Filtered entries successfully retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/entry"
        "400":
          description: Invalid parameters
        "404":
          description: User or category not found
        "500":
          description: Internal server error

  # And now.. more changes meow...

  /api/users/{userId}:

    get:
      summary: Retrieve a user by userId
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User successfully retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/user"
        "400":
          description: Invalid user ID
        "404":
          description: User not found
        "500":
          description: Internal server error


    delete:
      summary: Delete a user by userId
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: User deleted successfully
        "400":
          description: Invalid request
        "401":
          description: Unauthorized. You are not logged in
        "403":
          description: Forbidden. You are not said user.
        "404":
          description: User not found
        "500":
          description: Internal server error



  /api/users/friends/{userId}:
    get:
      summary: Retrieve all friend IDs of a user
      tags:
        - Friends
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Friend IDs successfully retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
                example:
                  - 17
                  - 23
                  - 91
        "400":
          description: Invalid user ID
        "404":
          description: User not found
        "500":
          description: Internal server error



  /api/users/friends/add/{userId}:
    post:
      summary: Add friend
      tags:
        - Friends
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Friend added successfully
        "400":
          description: Invalid request
        "401":
          description: Unauthorized. You are not logged in
        "404":
          description: User not found
        "409":
          description: Friendship already exists
        "422":
          description: Invalid friend operation (e.g. adding yourself)
        "500":
          description: Internal server error



  /api/users/friends/remove/{userId}:
    post:
      summary: Remove friend
      tags:
        - Friends
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Friend removed successfully
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "404":
          description: Friendship or user not found
        "500":
          description: Internal server error



  /api/users/achievements/{userId}:
    get:
      summary: Retrieve user achievements
      tags:
        - Achievements
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Achievements retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  example: First Discovery
        "404":
          description: User not found
        "500":
          description: Internal server error



  /api/users/edit:
    put:
      summary: Edit current user profile
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/user"
      responses:
        "200":
          description: User updated successfully
        "401":
          description: Unauthorized. You are not logged in.
        "403":
          description: Forbidden. You are not said user or lack the permission to edit.
        "409":
          description: Conflict (e.g. duplicate username)
        "422":
          description: Validation failed
        "500":
          description: Internal server error



  /api/users/experience/{userId}:
    get:
      summary: Retrieve user experience
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Experience successfully retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  experience:
