openapi: 3.0.3
info:
  title: Omnidex API
  version: 1.0.0
servers:
  - url: http://127.0.0.1:5000

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: [ ]

paths:
  /api/users/create:
    post:
      summary: Create a new user
      description: Creates a new user with a username and password.
      tags:
        - Users
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: alice
                password:
                  type: string
                  example: securePassword123
              required:
                - name
                - password

      responses:
        "201":
          description: User successfully created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User created successfully.

        "400":
          description: Invalid input or user already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User already exists

  /api/users/login:
    post:
      summary: Login user
      description: Authenticates user and returns a JWT token.
      tags:
        - Users
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: alice
                password:
                  type: string
                  example: securePassword123
              required:
                - name
                - password

      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Login successful
                  token:
                    type: string
                    example: eyJhbGciOi...

        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid credentials

  /api/status/health:
    get:
      summary: "Health check"
      description: "Responds with a simple OK"
      tags:
        - Status
      security: [ ]
      responses:
        "200":
          description: "Service is healthy"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "OK"

  /api/scan/login_test:
    get:
      summary: "Login test"
      description: "Responds with the user name"
      tags:
        - Login
      responses:
        "200":
          description: "User was authenticated"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Hallo alice"

  /api/users/set_profile_picture:
    post:
      summary: Set user profile picture
      description: Uploads and sets the profile picture for the authenticated user.
      tags:
        - Users

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  description: Base64 encoded image (data URL format)
                  example: "data:image/jpeg;base64,"

      responses:
        "200":
          description: Profile picture set successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Profile picture set successfully.

        "400":
          description: Invalid input (e.g. missing image)

        "401":
          description: Unauthorized

  /api/users/get_profile_picture:
    post:
      summary: Get user profile picture URL
      description: Returns a temporary URL to access the user's profile picture.
      tags:
        - Users
      security: [ ]

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
              properties:
                user_id:
                  type: integer
                  example: 1
                  description: ID of the user whose profile picture is requested

      responses:
        "200":
          description: Successfully retrieved profile picture URL
          content:
            application/json:
              schema:
                type: object
                required:
                  - url
                properties:
                  url:
                    type: string
                    format: uri
                    example: "https://127.0.0.1/images/profile-pictures/42?X-Amz-Algorithm=..."

        "400":
          description: Invalid request (missing or invalid user_id)

        "404":
          description: User or profile picture not found

  /api/image/{key}:
    get:
      summary: Get image by key
      security: [ ]
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
          description: Path to the image in storage
      responses:
        '200':
          description: Image file
          content:
            image/jpeg:
              schema:
                type: string
                format: binary