openapi: 3.0.3
info:
  title: Omnidex API
  version: 1.0.0
servers:
  - url: http://127.0.0.1:5000

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

paths:
  /api/users/create:
    post:
      summary: Create a new user
      description: Creates a new user with a username and password.
      tags:
        - Users
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: alice
                password:
                  type: string
                  example: securePassword123
              required:
                - name
                - password

      responses:
        "201":
          description: User successfully created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User created successfully.

        "400":
          description: Invalid input or user already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User already exists

  /api/users/login:
    post:
      summary: Login user
      description: Authenticates user and returns a JWT token.
      tags:
        - Users
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: alice
                password:
                  type: string
                  example: securePassword123
              required:
                - name
                - password

      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Login successful
                  token:
                    type: string
                    example: eyJhbGciOi...

        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid credentials
  /api/status/health:
    get:
      summary: "Health check"
      description: "Responds with a simple OK"
      tags:
        - Status
      security: []
      responses:
        "200":
          description: "Service is healthy"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "OK"
  /api/scan/login_test:
    get:
      summary: "Login test"
      description: "Responds with the user name"
      tags:
        - Login
      responses:
        "200":
          description: "User was authenticated"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Hallo alice"