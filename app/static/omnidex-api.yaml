openapi: 3.0.3
info:
  title: Omnidex API
  version: 1.0.0
servers:
  - url: http://127.0.0.1:5000

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  headers:
    CacheControl:
      description: HTTP caching policy for this response.
      schema:
        type: string
    ETag:
      description: Validator for conditional requests using If-None-Match or If-Match.
      schema:
        type: string
        example: '"9f86d081884c7d659a2feaa0c55ad015"'
    Vary:
      description: Request headers that influence the selected representation.
      schema:
        type: string

  schemas:
    entry:
      type: object
      required:
        - id
        - name
        - pictureId
        - description
        - category
        - entryDate
        - firstDiscoveredUserId
      properties:
        id:
          type: integer
          example: 101
        name:
          type: string
          example: Oak Tree
        pictureId:
          type: integer
          example: 5821
        description:
          type: string
          example: Large deciduous tree commonly found in forests.
        category:
          $ref: "#/components/schemas/category"
        entryDate:
          type: string
          format: date
          example: 2026-04-26
        firstDiscoveredUserId:
          type: integer
          example: 42

    newEntry:
      type: object
      required:
        - name
        - pictureId
        - description
        - category
      properties:
        name:
          type: string
        pictureId:
          type: integer
        description:
          type: string
        category:
          $ref: "#/components/schemas/category"

    entryUpdate:
      type: object
      properties:
        name:
          type: string
        pictureId:
          type: integer
        description:
          type: string
        category:
          $ref: "#/components/schemas/category"

    category:
      type: string
      enum:
        - PLANT
        - ANIMAL
        - OBJECT
        - MINERAL
        - FOOD

    user:
      type: object
      required:
        - id
        - name
        - friends
        - pictureURL
      properties:
        id:
          type: integer
          example: 42
        name:
          type: string
          example: Alice
        friends:
          type: array
          description: Array of friend user IDs
          items:
            type: integer
            example: 17
          example:
            - 17
            - 23
            - 91
        pictureURL:
          type: string
          example: https://example.com/profile.jpg

    recognitionAlternative:
      type: object
      required:
        - label
      properties:
        label:
          type: string
          example: cat
        confidence:
          type: number
          format: float
          nullable: true
          example: 0.74

    recognitionResult:
      type: object
      required:
        - label
        - confidence
        - alternatives
      properties:
        label:
          type: string
          example: cat
        confidence:
          type: number
          format: float
          example: 0.91
        alternatives:
          type: array
          items:
            $ref: "#/components/schemas/recognitionAlternative"
        category_hint:
          type: string
          nullable: true
          example: ANIMAL

    scanResult:
      type: object
      required:
        - label
        - confidence
        - alternatives
        - category
        - description
        - card_summary
        - knowledge_enriched
        - summary_generated_by_ai
      properties:
        id:
          type: integer
          nullable: true
          example: 3001
        label:
          type: string
          description: German display label saved for the object card. Falls back to the original recognition label if translation is unavailable.
          example: Eiche
        confidence:
          type: number
          format: float
          example: 0.94
        category_hint:
          type: string
          nullable: true
          example: PLANT
        category:
          type: string
          description: Final Omnidex category assigned by AI or fallback logic.
          enum:
            - Pflanze
            - Insekten
            - Tiere
            - Nahrung
            - Unbekannt
            - Technik
            - Mechanik
            - Gestein
            - Gegenstände
          example: Pflanze
        alternatives:
          type: array
          items:
            $ref: "#/components/schemas/recognitionAlternative"
        description:
          type: string
          example: Oaks are trees in the genus Quercus.
        card_summary:
          type: string
          description: German short summary for object cards, generated by AI or fallback and limited to max two sentences.
          example: Eichen sind langlebige Laubbäume, die in gemäßigten Regionen verbreitet sind. Sie bilden Eicheln und bieten vielen Arten Lebensraum.
        source_title:
          type: string
          nullable: true
          example: Oak
        source_url:
          type: string
          nullable: true
          example: https://en.wikipedia.org/wiki/Oak
        image_reference:
          type: string
          nullable: true
        knowledge_enriched:
          type: boolean
          example: true
        summary_generated_by_ai:
          type: boolean
          description: True when card_summary was generated by LISA summarization; false when fallback logic was used.
          example: true
        created_at:
          type: string
          nullable: true
          example: "2026-05-06T11:30:00Z"

    collectionEntrySummary:
      type: object
      required:
        - id
        - label
      properties:
        id:
          type: integer
          example: 2
        label:
          type: string
          description: German display label saved for the object card.
          example: Eidechse
        category:
          type: string
          nullable: true
          enum:
            - Pflanze
            - Insekten
            - Tiere
            - Nahrung
            - Unbekannt
            - Technik
            - Mechanik
            - Gestein
            - Gegenstände
        card_summary:
          type: string
          nullable: true
          description: German short summary shown on object cards, generated by AI or fallback.
        image_url:
          type: string
          nullable: true
          example: http://127.0.0.1:5000/v1/image/cards/1/abc.jpeg
        created_at:
          type: string
          nullable: true
          example: "2026-05-14T18:59:18"
        confidence:
          type: number
          format: float
          nullable: true
          example: 0.95

    collectionEntryDetail:
      type: object
      required:
        - id
        - label
      properties:
        id:
          type: integer
          example: 2
        label:
          type: string
          description: German display label saved for the object card.
          example: Eidechse
        category:
          type: string
          nullable: true
          enum:
            - Pflanze
            - Insekten
            - Tiere
            - Nahrung
            - Unbekannt
            - Technik
            - Mechanik
            - Gestein
            - Gegenstände
        confidence:
          type: number
          format: float
          nullable: true
        card_summary:
          type: string
          nullable: true
          description: German short summary shown on object cards, generated by AI or fallback.
        description:
          type: string
          nullable: true
        source_title:
          type: string
          nullable: true
        source_url:
          type: string
          nullable: true
        alternatives:
          type: array
          items:
            $ref: "#/components/schemas/recognitionAlternative"
        image_url:
          type: string
          nullable: true
        created_at:
          type: string
          nullable: true
          example: "2026-05-14T18:59:18"
    
    achievement:
      type: object
      required:
          - id
          - name
          - required
          - achievementReward
          - icon
      properties:
        id:
          type: integer
          example: 2
        name:
          type: string
          nullable: false
          example: "collect 20 plants"
        required:
          type: integer
          nullable: false
        achievementReward: 
          type: integer
          example: 200
        icon:
          type: string
          nullable: false
          example: http://127.0.0.1:5000/v1/image/cards/1/abc.jpeg


    achievementProgress:
      type: object
      required:
          - id
          - isDone
          - currentProgress
      properties:
        id:
          type: integer
          example: 2
        isDone:
          type: boolean
          nullable: false
        currentProgress:
          type: integer
          nullable: false
          example: 20



security:
  - bearerAuth: [ ]

paths:
  /v1/users/create:
    post:
      summary: Create a new user
      description: Creates a new user with a username, email and password.
      tags:
        - Users
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: alice
                email:
                  type: string
                  format: email
                  example: alice@example.com
                password:
                  type: string
                  example: securePassword123
              required:
                - name
                - email
                - password

      responses:
        "201":
          description: User successfully created
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User created successfully.

        "400":
          description: Invalid input or user already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User already exists

  /v1/users/login:
    post:
      summary: Login user
      description: Authenticates a local user or refreshes an existing session and returns access plus refresh tokens.
      tags:
        - Users
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  properties:
                    email:
                      type: string
                      format: email
                      example: alice@example.com
                    password:
                      type: string
                      example: securePassword123
                  required:
                    - email
                    - password
                - type: object
                  properties:
                    refresh_token:
                      type: string
                      description: Refresh token used for session rotation.
                      example: 7fe3cfec5c1140f2a8fd9ca8f8e0b56a
                  required:
                    - refresh_token

      responses:
        "200":
          description: Login successful
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Login successful
                  access_token:
                    type: string
                    example: eyJhbGciOi...
                  refresh_token:
                    type: string
                    example: 7fe3cfec5c1140f2a8fd9ca8f8e0b56a

        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid credentials
  /api/users/{user_id}:
    get:
      summary: Get user by ID
      description: Returns a user by their numeric ID.
      tags:
        - Users
      security: [ ]

      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
          description: ID of the user

      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      email:
                        type: string
                      friendcode:
                        type: string

        "404":
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User not found
  /v1/users/google/login:
    get:
      summary: Redirect to Google OAuth
      description: Redirects user to Google login page.
      tags:
        - Google OAuth
      security: [ ]
      responses:
        "302":
          description: Redirect to Google OAuth
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"

  /v1/users/google/callback:
    get:
      summary: Google OAuth callback
      description: Handles Google OAuth response and returns access plus refresh tokens.
      tags:
        - Google OAuth
      security: [ ]
      responses:
        "200":
          description: Login successful via Google
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    example: eyJhbGciOi...
                  refresh_token:
                    type: string
                    example: 7fe3cfec5c1140f2a8fd9ca8f8e0b56a
        "401":
          description: OAuth authentication failed
        "400":
          description: OAuth login failed (e.g. invalid or mismatching state / CSRF protection triggered)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: oauth_state_mismatch
                  message:
                    type: string
                    example: Login session expired or invalid state. Please try again.

  /v1/status/health:
    get:
      summary: "Health check"
      description: "Responds with a simple OK"
      tags:
        - Status
      security: [ ]
      responses:
        "200":
          description: "Service is healthy"
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "OK"

  /v1/wiki/summary/{title}:
    get:
      summary: Get Wikipedia summary for an article title
      description: Returns a public Wikipedia extract and supports HTTP caching with Cache-Control, ETag and 304 revalidation.
      tags:
        - Wiki
      security: [ ]
      parameters:
        - in: path
          name: title
          required: true
          schema:
            type: string
          description: Wikipedia article title.
        - in: header
          name: If-None-Match
          required: false
          schema:
            type: string
          description: Optional cached ETag. If it still matches, the server returns 304.
      responses:
        "200":
          description: Wikipedia summary found.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Vary:
              $ref: "#/components/headers/Vary"
          content:
            application/json:
              schema:
                type: object
                properties:
                  extract:
                    type: string
                    example: Cats are small domesticated carnivorous mammals.
        "304":
          description: Cached representation is still valid.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Vary:
              $ref: "#/components/headers/Vary"
        "404":
          description: Article not found. Response may be negatively cached for a short time.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            Vary:
              $ref: "#/components/headers/Vary"
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Article not found

  /v1/scan/login_test:
    get:
      summary: "Login test"
      description: "Responds with the user name"
      tags:
        - Login
      responses:
        "200":
          description: "User was authenticated"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Hallo alice"

  /v1/scan:
    post:
      summary: Create scan result from image
      description: Recognizes the uploaded image and enriches it with Wikipedia information.
      tags:
        - Scan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  description: Base64-encoded image. Data URL format is also accepted.
                  example: "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD..."
      responses:
        "200":
          description: Scan created successfully
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/scanResult"
        "400":
          description: Invalid request payload
        "422":
          description: Low confidence recognition result
        "502":
          description: Recognition returned invalid provider data
        "503":
          description: Recognition service unavailable

  /v1/scan/recognize:
    post:
      summary: Recognize object from image via LISA
      description: Sends image data to recognition provider and returns normalized recognition result.
      tags:
        - Scan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  description: Base64-encoded image. Data URL format is also accepted.
                  example: "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD..."
      responses:
        "200":
          description: Recognition succeeded
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/recognitionResult"
        "400":
          description: Invalid request payload
        "422":
          description: Low confidence result
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Low confidence recognition result.
                  label:
                    type: string
                    example: cat
                  confidence:
                    type: number
                    format: float
                    example: 0.41
                  minimum_confidence:
                    type: number
                    format: float
                    example: 0.90
        "502":
          description: Invalid provider response
        "503":
          description: Recognition service unavailable

  /v1/users/set_profile_picture:
    post:
      summary: Set user profile picture
      description: Uploads and sets the profile picture for the authenticated user.
      tags:
        - Users

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  description: Base64 encoded image (data URL format)
                  example: "data:image/jpeg;base64,"

      responses:
        "200":
          description: Profile picture set successfully
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Profile picture set successfully.

        "400":
          description: Invalid input (e.g. missing image)

        "401":
          description: Unauthorized

  /v1/users/get_profile_picture/{user_id}:
    get:
      summary: Get user profile picture URL
      description: Returns a temporary URL to access the user's profile picture.
      tags:
        - Users
      security: [ ]

      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
            example: 1
          description: ID of the user whose profile picture is requested

      responses:
        "200":
          description: Profile picture URL returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    example: https://example.com/image.jpg

        "400":
          description: Invalid request (missing or invalid user_id)

        "404":
          description: User or profile picture not found

  /v1/image/{key}:
    get:
      summary: Get image by key
      security: [ ]
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
          description: Path to the image in storage
        - in: header
          name: If-None-Match
          required: false
          schema:
            type: string
          description: Optional cached image ETag. If it still matches, the server returns 304.
      responses:
        '200':
          description: Image file
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "304":
          description: Cached image representation is still valid.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"

  /v1/collections/me:
    get:
      summary: List the authenticated user's saved collection entries
      tags:
        - Collection
      parameters:
        - in: query
          name: query
          required: false
          schema:
            type: string
          description: Optional search text. Matches label, card summary and description.
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [newest, oldest, alphabetical]
            default: newest
          description: Sort order by scan creation time or object label.
        - in: query
          name: category
          required: false
          schema:
            type: string
            enum:
              - Pflanze
              - Insekten
              - Tiere
              - Nahrung
              - Unbekannt
              - Technik
              - Mechanik
              - Gestein
              - Gegenstände
          description: Filter by the already stored category value.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 0
          description: Optional maximum number of entries to return.
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
          description: Optional number of entries to skip.
        - in: header
          name: If-None-Match
          required: false
          schema:
            type: string
          description: Optional cached collection ETag. If it still matches, the server returns 304.
      responses:
        "200":
          description: User collection entries.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Vary:
              $ref: "#/components/headers/Vary"
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/collectionEntrySummary"
        "400":
          description: Invalid sort/category/limit/offset.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "401":
          description: Unauthorized.
        "304":
          description: Cached collection list representation is still valid.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Vary:
              $ref: "#/components/headers/Vary"

  /v1/collections/me/{entryId}:
    get:
      summary: Get details of a single collection entry owned by the authenticated user
      tags:
        - Collection
      parameters:
        - in: path
          name: entryId
          required: true
          schema:
            type: integer
            minimum: 1
        - in: header
          name: If-None-Match
          required: false
          schema:
            type: string
          description: Optional cached entry ETag. If it still matches, the server returns 304.
      responses:
        "200":
          description: Collection entry detail.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Vary:
              $ref: "#/components/headers/Vary"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/collectionEntryDetail"
        "401":
          description: Unauthorized.
        "304":
          description: Cached collection detail representation is still valid.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Vary:
              $ref: "#/components/headers/Vary"
        "404":
          description: Collection entry not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /v1/collections/me/{entryId}/category:
    patch:
      summary: Update the category of one collection entry owned by the authenticated user
      tags:
        - Collection
      parameters:
        - in: path
          name: entryId
          required: true
          schema:
            type: integer
            minimum: 1
        - in: header
          name: If-Match
          required: false
          schema:
            type: string
          description: Optional ETag from the current detail representation. If it is stale, the server returns 412.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - category
              properties:
                category:
                  type: string
                  enum:
                    - Pflanze
                    - Insekten
                    - Tiere
                    - Nahrung
                    - Unbekannt
                    - Technik
                    - Mechanik
                    - Gestein
                    - Gegenstände
                  example: Tiere
      responses:
        "200":
          description: Collection entry category updated.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/collectionEntryDetail"
        "400":
          description: Invalid category.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "401":
          description: Unauthorized.
        "404":
          description: Collection entry not found.
